<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zindua</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <h1><span>Derrick Design</span></h1>
    <p>I'm Derick Wanyama from Nairobi, Kenya among the 
        members of Zindua school of Technology.
    </p>
    <div class="container">
        <h2>Registration form</h2>
        <form action="">
            <label for="username">Name</label>
            <input type="text" id="username"name="username"placeholder="Name" required><br>
            <label for="email">Email</label>
            <input type="email"id="email"name="email"placeholder="Email" required><br>
            <label for="password">Password</label>
            <input type="password"id="password"name="password"placeholder="Password"required><br>
            <label for="date">Date</label>
            <input type="date"id="date"placeholder="Date"min age="18 years" required><br>
            <button><a href="submit">Submit</a></button>
        </form>
    </div>
    
</body>
</html>
