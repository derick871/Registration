<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Image Slider</title>
<style>
    /* Basic page styling */
    body {
        margin: 0;
        padding: 0;
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    /* Slider container */
    .slider {
        width: 80%;
        max-width: 800px;
        height: 400px;
        overflow: hidden;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    /* Images wrapper */
    .slides {
        display: flex;
        width: 400%; /* 4 images → 100% each */
        animation: slide 16s infinite;
    }

    /* Each image */
    .slides img {
        width: 100%;
        height: 400px;
        object-fit: cover;
    }

    /* Animation for sliding */
    @keyframes slide {
        0%   { transform: translateX(0); }
        20%  { transform: translateX(0); }
        25%  { transform: translateX(-100%); }
        45%  { transform: translateX(-100%); }
        50%  { transform: translateX(-200%); }
        70%  { transform: translateX(-200%); }
        75%  { transform: translateX(-300%); }
        95%  { transform: translateX(-300%); }
        100% { transform: translateX(0); }
    }
</style>
</head>
<body>

<div class="slider">
    <div class="slides">
        <img src="images\derick1.jpg" alt="Image 1">
        <img src="images/deroo.jpg" alt="Image 2">
        <img src="images/pexer.jpg" alt="Image 3">
        <img src="images/pexer2.jpg" alt="Image 4">
    </div>
</div>

</body>
</html>
